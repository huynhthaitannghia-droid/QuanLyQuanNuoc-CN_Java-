<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order - LaQuin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; overflow: hidden; }
        .top-bar { background: white; border-bottom: 2px solid #e9ecef; }
        .sidebar { background: white; height: calc(100vh - 60px); overflow-y: auto; border-right: 2px solid #e9ecef; }
        .menu-item { cursor: pointer; border: 2px solid transparent; transition: 0.1s; user-select: none; }
        .menu-item:hover { border-color: #0d6efd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .menu-item:active { transform: scale(0.95); }
        .bill-section { background: white; height: calc(100vh - 60px); border-left: 2px solid #e9ecef; display: flex; flex-direction: column;}
        .category-btn { width: 100%; text-align: left; padding: 15px; border: none; border-bottom: 1px solid #ddd; background: white; font-weight: bold;}
        .category-btn.active, .category-btn:hover { background: #0d6efd; color: white; }

        /* Custom UI Hóa đơn */
        .bill-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .bill-label { color: #6c757d; font-weight: 600; font-size: 0.95rem; }
        .input-bill { width: 150px; }
    </style>
</head>
<body>

<div class="top-bar d-flex justify-content-between align-items-center px-4 py-2 shadow-sm">
    <h4 class="m-0 fw-bold text-dark">LaQuin - <span th:text="${ban.tenBan}">Tên Bàn</span></h4>
    <div>
        <button onclick="luuTamVaQuayLai()" class="btn btn-outline-secondary me-2 fw-bold"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại sơ đồ</button>
    </div>
</div>

<div class="container-fluid p-0">
    <div class="row g-0">

        <div class="col-md-2 sidebar p-0">
            <div class="bg-primary text-white p-3 fw-bold text-center border-bottom">DANH MỤC</div>
            <button class="category-btn active" data-madm="ALL">Tất cả</button>
            <button class="category-btn" th:each="dm : ${listDM}" th:text="${dm.tenDM}" th:data-madm="${dm.maDM}"></button>
        </div>

        <div class="col-md-7 p-4" style="height: calc(100vh - 60px); overflow-y: auto;">
            <div class="row g-3" id="danhSachMon">
                <div class="col-md-3 sp-item" th:each="sp : ${listSP}" th:data-madm="${sp.danhMuc.maDM}">
                    <div class="card menu-item h-100 text-center p-2 add-to-cart-btn"
                         th:data-id="${sp.maSP}"
                         th:data-ten="${sp.tenSP}"
                         th:data-gia="${sp.giaBan}">

                        <div class="bg-light rounded mb-2 d-flex align-items-center justify-content-center overflow-hidden" style="height: 100px;">
                            <img th:if="${sp.hinhAnh != null and sp.hinhAnh != ''}"
                                 th:src="${sp.hinhAnh}"
                                 alt="Ảnh món"
                                 style="width: 100%; height: 100%; object-fit: cover;">

                            <i th:unless="${sp.hinhAnh != null and sp.hinhAnh != ''}"
                               class="fa-solid fa-mug-hot text-secondary fs-1"></i>
                        </div>

                        <h6 class="fw-bold mb-1" th:text="${sp.tenSP}">Tên món</h6>
                        <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(sp.giaBan, 0, 'COMMA', 0, 'POINT')} + ' đ'">Giá</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3 bill-section">
            <div class="flex-grow-1 p-3 overflow-auto border-bottom" id="cart-items">
                <div class="text-center text-muted mt-5">Chưa có món nào được chọn.</div>
            </div>

            <div class="px-4 pt-3 pb-2 bg-white">
                <div class="bill-row">
                    <span class="bill-label">Tạm tính:</span>
                    <span id="tam-tinh" class="fw-bold text-dark fs-6">0 đ</span>
                </div>

                <div class="bill-row">
                    <span class="bill-label">Chiết khấu:</span>
                    <div class="input-group input-group-sm input-bill">
                        <input type="text" class="form-control text-end shadow-none" id="input-chiet-khau" placeholder="0">
                        <select class="form-select shadow-none bg-light fw-bold text-dark" id="loai-chiet-khau" style="flex: 0 0 60px; cursor: pointer; padding-left: 0.5rem; padding-right: 1.5rem; background-position: right 0.25rem center; background-size: 12px 12px;">
                            <option value="VND">  đ</option>
                            <option value="PERCENT">%</option>
                        </select>
                    </div>
                </div>

                <div class="bill-row">
                    <span class="bill-label">Phụ thu:</span>
                    <div class="input-group input-group-sm input-bill">
                        <input type="text" class="form-control text-end shadow-none" id="input-phu-thu" placeholder="0">
                        <span class="input-group-text bg-light fw-bold text-muted justify-content-center" style="flex: 0 0 60px;">đ</span>
                    </div>
                </div>
            </div>
            <div class="px-4 py-3 bg-light border-top">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-5 fw-bold text-danger">TỔNG TIỀN:</span>
                    <span id="cart-total" class="fs-4 fw-bold text-danger">0 đ</span>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary w-75 py-3 fw-bold fs-5 rounded-1" onclick="thanhToan()"><i class="fa-solid fa-credit-card me-2"></i> THANH TOÁN</button>
                    <button class="btn btn-danger w-25 py-3 fw-bold rounded-1 fs-5" onclick="huyDon()" title="Hủy toàn bộ đơn"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="optionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border: 2px solid #0d6efd; border-radius: 15px;">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title w-100 text-center fw-bold fs-4">
                    <span id="modalItemName" class="text-dark">Tên món</span> -
                    <span id="modalItemPrice" class="text-warning">Giá tiền</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-5">

                <input type="text" id="modalNote" class="form-control mb-4 rounded-pill px-4 py-2 border-secondary" placeholder="Ghi chú thêm...">

                <div class="mb-3">
                    <h6 class="fw-bold border-bottom pb-2 d-inline-block">Lượng đường</h6>
                    <div class="d-flex gap-2 mt-2 flex-wrap">
                        <input type="radio" class="btn-check option-duong" name="duong" id="duong0" value="0% đường">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="duong0">0% đường</label>

                        <input type="radio" class="btn-check option-duong" name="duong" id="duong30" value="30% đường">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="duong30">30% đường</label>

                        <input type="radio" class="btn-check option-duong" name="duong" id="duong50" value="50% đường">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="duong50">50% đường</label>

                        <input type="radio" class="btn-check option-duong" name="duong" id="duong70" value="70% đường">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="duong70">70% đường</label>
                    </div>
                </div>

                <div class="mb-3 mt-4">
                    <h6 class="fw-bold border-bottom pb-2 d-inline-block text-danger">Lượng đá (*)</h6>
                    <div class="d-flex gap-2 mt-2 flex-wrap">
                        <input type="radio" class="btn-check option-da" name="da" id="da0" value="Không đá">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="da0">Không đá</label>

                        <input type="radio" class="btn-check option-da" name="da" id="darieng" value="Đá riêng">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="darieng">Đá riêng</label>

                        <input type="radio" class="btn-check option-da" name="da" id="dait" value="Ít đá">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="dait">Ít đá</label>

                        <input type="radio" class="btn-check option-da" name="da" id="dachung" value="Đá chung">
                        <label class="btn btn-outline-secondary rounded-pill px-4" for="dachung">Đá chung</label>
                    </div>
                </div>

                <div class="mb-4 mt-4">
                    <h6 class="fw-bold border-bottom pb-2 d-inline-block">Topping</h6>
                    <div class="d-flex gap-2 mt-2 flex-wrap">
                        <input type="checkbox" class="btn-check option-topping" id="top1" value="1" data-name="Trân châu đen" data-price="5000">
                        <label class="btn btn-outline-secondary rounded-3 px-3 text-center" for="top1">Trân châu đen<br><small>+ 5.000đ</small></label>

                        <input type="checkbox" class="btn-check option-topping" id="top2" value="2" data-name="Trân châu trắng" data-price="5000">
                        <label class="btn btn-outline-secondary rounded-3 px-3 text-center" for="top2">Trân châu trắng<br><small>+ 5.000đ</small></label>

                        <input type="checkbox" class="btn-check option-topping" id="top3" value="3" data-name="Sương sáo" data-price="8000">
                        <label class="btn btn-outline-secondary rounded-3 px-3 text-center" for="top3">Sương sáo<br><small>+ 8.000đ</small></label>

                        <input type="checkbox" class="btn-check option-topping" id="top4" value="4" data-name="Pudding" data-price="8000">
                        <label class="btn btn-outline-secondary rounded-3 px-3 text-center" for="top4">Pudding<br><small>+ 8.000đ</small></label>
                    </div>
                </div>

            </div>
            <div class="modal-footer border-top-0 justify-content-end px-5 pb-4">
                <button type="button" class="btn btn-primary px-5 py-2 fw-bold fs-5 rounded-pill" id="btnSaveOption">Lưu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. CHỨC NĂNG LỌC DANH MỤC
    const catButtons = document.querySelectorAll('.category-btn');
    const spItems = document.querySelectorAll('.sp-item');

    catButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            catButtons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const maDM = this.getAttribute('data-madm');

            spItems.forEach(item => {
                if (maDM === 'ALL' || item.getAttribute('data-madm') === maDM) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });

    // 2. CHỨC NĂNG GIỎ HÀNG VÀ TÙY CHỌN (POS CORE)
    let gioHang = [];
    let monDangChon = null;
    const optionModal = new bootstrap.Modal(document.getElementById('optionModal'));

    const formatMoney = (amount) => {
        return new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
    }

    // A. XỬ LÝ SỰ KIỆN NHẬP CHIẾT KHẤU & PHỤ THU
    const inputChietKhau = document.getElementById('input-chiet-khau');
    const loaiChietKhau = document.getElementById('loai-chiet-khau');
    const inputPhuThu = document.getElementById('input-phu-thu');

    function formatNumberInput(e) {
        let val = e.target.value.replace(/\D/g, ""); // Chỉ lấy số
        if(!val) {
            e.target.value = "";
            veLaiGioHang();
            return;
        }

        if (e.target.id === 'input-chiet-khau' && loaiChietKhau.value === 'PERCENT') {
            // Giới hạn max 100 nếu là %
            let num = parseInt(val, 10);
            if (num > 100) num = 100;
            e.target.value = num;
        } else {
            // Hiển thị format tiền tệ có dấu phẩy
            e.target.value = new Intl.NumberFormat('vi-VN').format(parseInt(val, 10));
        }
        veLaiGioHang();
    }

    inputChietKhau.addEventListener('input', formatNumberInput);
    inputPhuThu.addEventListener('input', formatNumberInput);

    loaiChietKhau.addEventListener('change', function() {
        // Định dạng lại ô chiết khấu nếu đổi qua lại giữa đ và %
        let val = inputChietKhau.value.replace(/\D/g, "");
        if(val) {
            if(this.value === 'PERCENT') {
                let num = parseInt(val, 10);
                if (num > 100) num = 100;
                inputChietKhau.value = num;
            } else {
                inputChietKhau.value = new Intl.NumberFormat('vi-VN').format(parseInt(val, 10));
            }
        }
        veLaiGioHang();
    });

    // B. BẤM VÀO MÓN -> MỞ POPUP TÙY CHỌN
    const addToCartButtons = document.querySelectorAll('.add-to-cart-btn');
    addToCartButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            monDangChon = {
                id: this.getAttribute('data-id'),
                ten: this.getAttribute('data-ten'),
                giaGoc: parseFloat(this.getAttribute('data-gia'))
            };

            document.getElementById('modalItemName').innerText = monDangChon.ten;
            document.getElementById('modalItemPrice').innerText = formatMoney(monDangChon.giaGoc);

            document.getElementById('modalNote').value = '';
            document.querySelectorAll('.option-duong').forEach(r => r.checked = false);
            document.querySelectorAll('.option-da').forEach(r => r.checked = false);
            document.querySelectorAll('.option-topping').forEach(c => c.checked = false);

            optionModal.show();
        });
    });

    // C. BẤM NÚT "LƯU" TRONG POPUP
    document.getElementById('btnSaveOption').addEventListener('click', function() {
        const daDaChon = document.querySelector('.option-da:checked');
        if (!daDaChon) {
            alert("Vui lòng chọn Lượng đá!");
            return;
        }

        const duongDaChon = document.querySelector('.option-duong:checked');
        const strDuong = duongDaChon ? duongDaChon.value : "100% đường";

        let strTopping = [];
        let dsMaTopping = [];
        let tienTopping = 0;
        document.querySelectorAll('.option-topping:checked').forEach(top => {
            strTopping.push(top.getAttribute('data-name'));
            tienTopping += parseFloat(top.getAttribute('data-price'));
            dsMaTopping.push(parseInt(top.value));
        });

        const ghiChu = document.getElementById('modalNote').value;

        let mangOption = [strDuong, daDaChon.value];
        if (strTopping.length > 0) mangOption = mangOption.concat(strTopping);
        let chuoiOption = mangOption.join(', ');
        if (ghiChu) chuoiOption += ` (${ghiChu})`;

        const giaCuoi = monDangChon.giaGoc + tienTopping;
        const cartItemId = monDangChon.id + '_' + chuoiOption.replace(/\s+/g, '');

        const existingItem = gioHang.find(item => item.cartId === cartItemId);
        if (existingItem) {
            existingItem.soLuong++;
        } else {
            gioHang.push({
                cartId: cartItemId,
                id: monDangChon.id,
                ten: monDangChon.ten,
                gia: giaCuoi,
                soLuong: 1,
                tuyChon: chuoiOption,
                luongDuong: strDuong,
                luongDa: daDaChon.value,
                toppingIds: dsMaTopping
            });
        }

        veLaiGioHang();
        optionModal.hide();
    });

    // D. HÀM ĐỔI SỐ LƯỢNG (+ / -)
    window.doiSoLuong = function(cartId, thayDoi) {
        const index = gioHang.findIndex(item => item.cartId === cartId);
        if (index !== -1) {
            gioHang[index].soLuong += thayDoi;
            if (gioHang[index].soLuong <= 0) {
                gioHang.splice(index, 1);
            }
            veLaiGioHang();
        }
    }

    // E. HÀM VẼ LẠI BILL BÊN PHẢI & TÍNH TOÁN
    function veLaiGioHang() {
        const cartContainer = document.getElementById('cart-items');
        const tamTinhContainer = document.getElementById('tam-tinh');
        const totalContainer = document.getElementById('cart-total');

        cartContainer.innerHTML = '';
        let tamTinh = 0;

        // Nếu giỏ hàng trống
        if (gioHang.length === 0) {
            cartContainer.innerHTML = '<div class="text-center text-muted mt-5">Chưa có món nào được chọn.</div>';
            tamTinhContainer.innerText = '0 đ';
            totalContainer.innerText = '0 đ';
            inputChietKhau.value = '';
            inputPhuThu.value = '';
            return;
        }

        // Render các món
        gioHang.forEach(item => {
            tamTinh += (item.gia * item.soLuong);
            const html = `
                <div class="d-flex justify-content-between align-items-start mb-3 border-bottom pb-2">
                    <div style="flex: 1; padding-right: 10px;">
                        <div class="fw-bold">${item.ten}</div>
                        <small class="text-muted d-block lh-sm mb-1" style="font-size: 0.8rem;">${item.tuyChon}</small>
                        <div class="text-danger fw-bold">${formatMoney(item.gia)}</div>
                    </div>
                    <div class="d-flex align-items-center mt-1">
                        <button class="btn btn-sm btn-light border" onclick="doiSoLuong('${item.cartId}', -1)">-</button>
                        <span class="mx-2 fw-bold">${item.soLuong}</span>
                        <button class="btn btn-sm btn-light border" onclick="doiSoLuong('${item.cartId}', 1)">+</button>
                    </div>
                </div>
            `;
            cartContainer.innerHTML += html;
        });

        // Hiển thị tạm tính
        tamTinhContainer.innerText = formatMoney(tamTinh);

        // Đọc giá trị để tính chiết khấu và phụ thu
        let valChietKhau = parseInt(inputChietKhau.value.replace(/\D/g, "")) || 0;
        let valPhuThu = parseInt(inputPhuThu.value.replace(/\D/g, "")) || 0;
        let loaiCK = loaiChietKhau.value;

        let tienChietKhau = 0;
        if (loaiCK === 'PERCENT') {
            tienChietKhau = tamTinh * (valChietKhau / 100);
        } else {
            tienChietKhau = valChietKhau; // Mức tiền cố định
        }

        // Tính tổng cuối cùng
        let tongTien = tamTinh - tienChietKhau + valPhuThu;
        if (tongTien < 0) tongTien = 0; // Đảm bảo tổng tiền không bị âm

        totalContainer.innerText = formatMoney(tongTien);
    }

    // F. XỬ LÝ NÚT THANH TOÁN
    window.thanhToan = function() {
        if (gioHang.length === 0) {
            alert("Vui lòng chọn ít nhất 1 món để thanh toán!");
            return;
        }

        // Tính lại y hệt Logic trên để ra tổng tiền mang đi thanh toán
        let tamTinh = 0;
        gioHang.forEach(item => tamTinh += (item.gia * item.soLuong));

        let valChietKhau = parseInt(inputChietKhau.value.replace(/\D/g, "")) || 0;
        let valPhuThu = parseInt(inputPhuThu.value.replace(/\D/g, "")) || 0;
        let tienChietKhau = (loaiChietKhau.value === 'PERCENT') ? (tamTinh * (valChietKhau / 100)) : valChietKhau;

        let tongTien = tamTinh - tienChietKhau + valPhuThu;
        if (tongTien < 0) tongTien = 0;

        localStorage.setItem('tongTienThanhToan', tongTien);
        localStorage.setItem('gioHang', JSON.stringify(gioHang));

        const maBan = "[[${ban.maBan}]]";
        window.location.href = '/hoa-don/thanh-toan/' + maBan;
    }

    // G. HÀM LƯU TẠM ĐƠN HÀNG VÀ CẬP NHẬT DATABASE
    window.luuTamVaQuayLai = function() {
        const maBan = "[[${ban.maBan}]]";
        let trangThaiMoi = "Trống";

        if (gioHang.length > 0) {
            let tongTien = 0;
            gioHang.forEach(item => tongTien += (item.gia * item.soLuong));

            localStorage.setItem('parked_cart_' + maBan, JSON.stringify(gioHang));
            localStorage.setItem('parked_total_' + maBan, tongTien);

            trangThaiMoi = "Có khách";
        } else {
            localStorage.removeItem('parked_cart_' + maBan);
            localStorage.removeItem('parked_total_' + maBan);
        }

        const formData = new FormData();
        formData.append("maBan", maBan);
        formData.append("trangThai", trangThaiMoi);

        fetch('/hoa-don/cap-nhat-trang-thai-ban', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            if(data === "OK") {
                window.location.href = '/hoa-don/ban-hang';
            } else {
                alert("Lỗi cập nhật trạng thái bàn: " + data);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            window.location.href = '/hoa-don/ban-hang';
        });
    }

    // H. HÀM TỰ ĐỘNG KHÔI PHỤC GIỎ HÀNG
    document.addEventListener('DOMContentLoaded', function() {
        const maBan = "[[${ban.maBan}]]";
        const savedCart = localStorage.getItem('parked_cart_' + maBan);
        if (savedCart) {
            gioHang = JSON.parse(savedCart);
            veLaiGioHang();
        }
    });

    // I. HÀM HỦY ĐƠN
    window.huyDon = function() {
        if (gioHang.length === 0) {
            alert("Đơn hàng đang trống, không có gì để hủy cả!");
            return;
        }

        const xacNhan = confirm("⚠️ BẠN CÓ CHẮC CHẮN MUỐN HỦY ĐƠN?\nToàn bộ các món đã chọn sẽ bị xóa sạch.");

        if (xacNhan) {
            gioHang = [];
            veLaiGioHang();

            const maBan = "[[${ban.maBan}]]";
            localStorage.removeItem('parked_cart_' + maBan);
            localStorage.removeItem('parked_total_' + maBan);
        }
    }
</script>
</body>
</html>
