<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh Mục - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; padding: 0; }
        .wrapper { display: flex; width: 100%; }
        #sidebar { position: fixed; top: 0; left: 0; width: 250px; height: 100vh; background: #343a40; color: #fff; display: flex; flex-direction: column; z-index: 1000; }
        #sidebar .sidebar-header { padding: 20px; background: #2f353a; text-align: center; }
        #sidebar ul li a { padding: 15px 20px; font-size: 1.1rem; display: block; color: #c2c7d0; text-decoration: none; transition: 0.3s; }
        #sidebar ul li a:hover { color: #fff; background: #495057; }
        #sidebar ul li.active > a { color: #fff; background: #007bff; border-left: 4px solid #fff; }
        #content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; min-height: 100vh; }
        .table-custom { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-custom th { background-color: #f8f9fa; color: #495057; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 15px; border-bottom: 2px solid #dee2e6; }
        .table-custom td { padding: 15px; vertical-align: middle; color: #555; }
        .action-btn { width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; transition: 0.2s; }
        .action-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar" class="d-flex flex-column">
        <div class="sidebar-header"><h4 class="m-0 fw-bold text-white"><i class="fa-solid fa-mug-hot me-2"></i>LaQuin Admin</h4></div>
        <ul class="list-unstyled components mt-3">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie me-2"></i> Tổng quan</a></li>
            <li><a href="/san-pham"><i class="fa-solid fa-box me-2"></i> Quản lý Sản phẩm</a></li>
            <li class="active"><a href="/danh-muc"><i class="fa-solid fa-layer-group me-2"></i> Quản lý Danh mục</a></li>
            <li><a href="/nhan-vien"><i class="fa-solid fa-users me-2"></i> Quản lý Nhân viên</a></li>

            <li><a href="/ban"><i class="fa-solid fa-table-cells-large me-2"></i> Quản lý Bàn</a></li>
            <li><a href="/topping"><i class="fa-solid fa-ice-cream me-2"></i> Quản lý Topping</a></li>

            <li class="border-top mt-3"><a href="/hoa-don/ban-hang" class="text-warning"><i class="fa-solid fa-cash-register me-2"></i> Bán Hàng (POS)</a></li>
        </ul>
        <ul class="list-unstyled mt-auto mb-3"><li class="border-top pt-2"><a href="#" onclick="dangXuat()" class="text-danger fw-bold"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li></ul>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0">Danh Mục Menu</h2>
                <p class="text-muted m-0">Phân loại các nhóm đồ ăn và thức uống.</p>
            </div>

            <form action="/danh-muc" method="get" class="d-flex w-50 mx-4">
                <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden; border: 1px solid #ced4da;">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control border-0 bg-white" placeholder="Tìm tên danh mục..." autocomplete="off">
                    <button class="btn btn-primary px-4 fw-bold" type="submit"><i class="fa-solid fa-magnifying-glass me-1"></i> Tìm</button>
                    <a th:if="${keyword != null and keyword != ''}" href="/danh-muc" class="btn btn-danger px-3 border-start"><i class="fa-solid fa-xmark"></i></a>
                </div>
            </form>

            <a href="/danh-muc/them" class="btn btn-primary fw-bold shadow-sm text-nowrap" style="border-radius: 10px; padding: 10px 20px;">
                <i class="fa-solid fa-plus me-2"></i> Thêm danh mục
            </a>
        </div>

        <div class="table-custom">
            <table class="table table-hover m-0">
                <thead>
                <tr>
                    <th class="text-center" width="100">Mã DM</th>
                    <th>Tên Danh Mục</th>
                    <th class="text-center" width="150">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="dm : ${listDM}">
                    <td class="text-center fw-bold text-muted" th:text="'#' + ${dm.maDM}">#1</td>
                    <td class="fw-bold text-dark fs-5" th:text="${dm.tenDM}">Cà phê</td>
                    <td class="text-center">
                        <a th:href="@{'/danh-muc/sua/' + ${dm.maDM}}" class="btn btn-light text-primary action-btn shadow-sm me-1" title="Sửa"><i class="fa-solid fa-pen"></i></a>
                        <a th:href="@{'/danh-muc/xoa/' + ${dm.maDM}}" onclick="return confirm('Cảnh báo: Bạn có chắc muốn xóa?')" class="btn btn-light text-danger action-btn shadow-sm" title="Xóa"><i class="fa-solid fa-trash-can"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listDM)}">
                    <td colspan="3" class="text-center text-muted py-5">
                        <i class="fa-solid fa-folder-open fs-1 mb-3 opacity-50"></i>
                        <h5>Chưa có danh mục nào</h5>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>function dangXuat() { if(confirm("Xác nhận đăng xuất?")) { localStorage.clear(); window.location.href = '/logout'; } }</script>
</body>
</html>
