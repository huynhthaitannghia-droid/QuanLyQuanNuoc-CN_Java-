<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${sanPham.maSP == null} ? 'Thêm Sản Phẩm - Admin LaQuin' : 'Cập Nhật Sản Phẩm - Admin LaQuin'">Form Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; padding: 0; }
        .wrapper { display: flex; width: 100%; }

        /* SIDEBAR ĐỒNG BỘ */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
            background: #343a40; color: #fff; display: flex; flex-direction: column; z-index: 1000;
        }
        #sidebar .sidebar-header { padding: 20px; background: #2f353a; text-align: center; }
        #sidebar ul li a { padding: 15px 20px; font-size: 1.1rem; display: block; color: #c2c7d0; text-decoration: none; transition: 0.3s; }
        #sidebar ul li a:hover { color: #fff; background: #495057; }
        #sidebar ul li.active > a { color: #fff; background: #007bff; border-left: 4px solid #fff; }

        #content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; min-height: 100vh; }

        .form-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 40px; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar" class="d-flex flex-column">
        <div class="sidebar-header">
            <h4 class="m-0 fw-bold text-white"><i class="fa-solid fa-mug-hot me-2"></i>LaQuin Admin</h4>
        </div>
        <ul class="list-unstyled components mt-3">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie me-2"></i> Tổng quan</a></li>
            <li class="active"><a href="/san-pham"><i class="fa-solid fa-box me-2"></i> Quản lý Sản phẩm</a></li>
            <li><a href="/danh-muc"><i class="fa-solid fa-layer-group me-2"></i> Quản lý Danh mục</a></li>
            <li><a href="/nhan-vien"><i class="fa-solid fa-users me-2"></i> Quản lý Nhân viên</a></li>

            <li><a href="/ban"><i class="fa-solid fa-table-cells-large me-2"></i> Quản lý Bàn</a></li>
            <li><a href="/topping"><i class="fa-solid fa-ice-cream me-2"></i> Quản lý Topping</a></li>

            <li class="border-top mt-3"><a href="/hoa-don/ban-hang" class="text-warning"><i class="fa-solid fa-cash-register me-2"></i> Bán Hàng (POS)</a></li>
        </ul>
        <ul class="list-unstyled mt-auto mb-3">
            <li class="border-top pt-2"><a href="#" onclick="dangXuat()" class="text-danger fw-bold"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
        </ul>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0" th:text="${sanPham.maSP == null} ? 'Thêm Sản Phẩm Mới' : 'Cập Nhật Sản Phẩm'">Form</h2>
                <p class="text-muted m-0">Điền thông tin chi tiết và tải ảnh minh họa cho món ăn.</p>
            </div>
            <a href="/san-pham" class="btn btn-outline-secondary fw-bold shadow-sm" style="border-radius: 10px; padding: 10px 20px;">
                <i class="fa-solid fa-arrow-left me-2"></i> Quay lại danh sách
            </a>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="form-card">
                    <form th:action="@{/san-pham/luu}" th:object="${sanPham}" method="post" enctype="multipart/form-data">

                        <input type="hidden" th:field="*{maSP}">

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Tên Sản Phẩm <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{tenSP}" class="form-control form-control-lg" placeholder="Ví dụ: Cà phê sữa đá" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Hình Ảnh Minh Họa</label>
                            <input type="file" name="fileAnh" class="form-control form-control-lg" accept="image/*">

                            <div th:if="${sanPham.hinhAnh != null}" class="mt-3 p-2 border rounded bg-light d-inline-block">
                                <p class="text-muted mb-2" style="font-size: 0.85rem;"><i class="fa-solid fa-image me-1"></i> Ảnh đang dùng:</p>
                                <img th:src="@{${sanPham.hinhAnh}}" alt="Ảnh sản phẩm" style="height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc;">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Đơn Giá <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" th:field="*{giaBan}" class="form-control form-control-lg" placeholder="Ví dụ: 25000" min="0" required>
                                    <span class="input-group-text fw-bold">VNĐ</span>
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Danh Mục <span class="text-danger">*</span></label>
                                <select th:field="*{danhMuc.maDM}" class="form-select form-select-lg" required>
                                    <option value="" th:if="${sanPham.danhMuc == null}" disabled selected>-- Chọn danh mục --</option>
                                    <option th:each="dm : ${listDM}"
                                            th:value="${dm.maDM}"
                                            th:text="${dm.tenDM}">Tên danh mục</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4 text-muted border-top border-2">

                        <div class="d-flex justify-content-end">
                            <button type="reset" class="btn btn-light me-2 fw-bold px-4 py-2 border"><i class="fa-solid fa-rotate-right me-1"></i> Làm lại</button>
                            <button type="submit" class="btn btn-primary fw-bold px-4 py-2 shadow-sm"><i class="fa-solid fa-floppy-disk me-1"></i> Lưu Thông Tin</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function dangXuat() {
        if(confirm("⚠️ Bạn có chắc chắn muốn đăng xuất khỏi phiên quản trị?")) {
            localStorage.clear();
            window.location.href = '/logout';
        }
    }
</script>
</body>
</html>
