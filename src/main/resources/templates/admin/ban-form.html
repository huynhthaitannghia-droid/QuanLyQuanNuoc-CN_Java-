<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Bàn - Admin LaQuin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; padding: 0; }
        .wrapper { display: flex; width: 100%; }

        /* SIDEBAR CỐ ĐỊNH */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
            background: #343a40; color: #fff; display: flex; flex-direction: column; z-index: 1000;
        }
        #sidebar .sidebar-header { padding: 20px; background: #2f353a; text-align: center; }
        #sidebar ul li a { padding: 15px 20px; font-size: 1.1rem; display: block; color: #c2c7d0; text-decoration: none; }
        #sidebar ul li a:hover { color: #fff; background: #495057; }
        #sidebar ul li.active > a { color: #fff; background: #007bff; }

        #content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; min-height: 100vh; }
        .card-form { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar" class="d-flex flex-column">
        <div class="sidebar-header">
            <h4 class="m-0 fw-bold text-white"><i class="fa-solid fa-mug-hot me-2"></i>LaQuin Admin</h4>
        </div>
        <ul class="list-unstyled components mt-3">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie me-2"></i> Tổng quan</a></li>
            <li><a href="/san-pham"><i class="fa-solid fa-box me-2"></i> Quản lý Sản phẩm</a></li>
            <li><a href="/danh-muc"><i class="fa-solid fa-layer-group me-2"></i> Quản lý Danh mục</a></li>
            <li><a href="/nhan-vien"><i class="fa-solid fa-users me-2"></i> Quản lý Nhân viên</a></li>

            <li class="active"><a href="/ban"><i class="fa-solid fa-table-cells-large me-2"></i> Quản lý Bàn</a></li>
            <li><a href="/topping"><i class="fa-solid fa-ice-cream me-2"></i> Quản lý Topping</a></li>

            <li class="border-top mt-3"><a href="/hoa-don/ban-hang" class="text-warning"><i class="fa-solid fa-cash-register me-2"></i> Bán Hàng (POS)</a></li>
        </ul>
        <ul class="list-unstyled mt-auto mb-3">
            <li class="border-top pt-2"><a href="#" onclick="dangXuat()" class="text-danger fw-bold"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
        </ul>
    </nav>

    <div id="content">
        <div class="row justify-content-center mt-3">
            <div class="col-md-8 col-lg-6">
                <a th:href="@{/ban}" class="text-decoration-none text-secondary mb-3 d-inline-block fw-semibold">
                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại danh sách
                </a>

                <div class="card card-form border-0 bg-white">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h4 class="fw-bold mb-0 text-dark" th:text="${ban.maBan == null ? 'Thêm Bàn Mới' : 'Cập Nhật Tên Bàn'}">Thêm Bàn</h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/ban/luu}" th:object="${ban}" method="post">

                            <input type="hidden" th:field="*{maBan}" />

                            <div class="mb-5">
                                <label for="tenBan" class="form-label fw-semibold text-muted">Tên Bàn <span class="text-danger">*</span></label>
                                <input type="text" id="tenBan" th:field="*{tenBan}" class="form-control form-control-lg bg-light"
                                       placeholder="VD: Bàn 1, Bàn VIP, Mang về..." required />
                                <div class="form-text mt-2"><i class="fa-solid fa-circle-info me-1"></i> Trạng thái bàn sẽ được hệ thống tự động cập nhật khi có khách order.</div>
                            </div>

                            <div class="d-flex justify-content-end border-top pt-4">
                                <a th:href="@{/ban}" class="btn btn-light border px-4 me-2">Hủy bỏ</a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="fa-solid fa-floppy-disk me-1"></i> Lưu dữ liệu
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function dangXuat() { if(confirm("Chắc chắn muốn thoát?")) window.location.href = '/logout'; }
</script>
</body>
</html>
